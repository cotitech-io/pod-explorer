name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pod-explorer-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  DIST_DIR: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync static assets to S3
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
        run: |
          TARGET="s3://${S3_BUCKET}"
          if [ -n "${S3_PREFIX}" ]; then
            TARGET="${TARGET}/${S3_PREFIX}"
          fi

          aws s3 sync "${DIST_DIR}/" "${TARGET}/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html with no-cache
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
        run: |
          TARGET="s3://${S3_BUCKET}"
          if [ -n "${S3_PREFIX}" ]; then
            TARGET="${TARGET}/${S3_PREFIX}"
          fi

          aws s3 cp "${DIST_DIR}/index.html" "${TARGET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
        run: |
          INVALIDATION_PATH="/*"
          if [ -n "${S3_PREFIX}" ]; then
            INVALIDATION_PATH="/${S3_PREFIX}/*"
          fi

          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "${INVALIDATION_PATH}"
